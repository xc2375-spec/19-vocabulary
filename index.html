<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陶瓷主题词汇大屏讲解</title>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7/dist/hanzi-writer.min.js"></script>
  <style>
    :root {
      --bg: #f7f4ef;
      --panel: #fffdf9;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e7dccd;
      --accent: #8b5e34;
      --accent-soft: #f3e6d6;
      --shadow: 0 12px 30px rgba(0,0,0,.08);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC","Noto Sans SC","Microsoft YaHei",Arial,sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #fff8ef 0%, transparent 32%),
        linear-gradient(180deg, #f8f3ec 0%, #f3eee6 100%);
    }
    .wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 28px 28px 40px;
    }
    .hero {
      background: linear-gradient(135deg, rgba(139,94,52,.15), rgba(255,255,255,.75));
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 28px 32px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: 2.4rem;
      line-height: 1.2;
    }
    .hero p {
      margin: 0;
      font-size: 1.15rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr auto auto;
      gap: 14px;
      align-items: center;
      margin: 20px 0 24px;
    }
    .search, .select {
      border: 2px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      min-height: 68px;
      font-size: 1.15rem;
      padding: 0 18px;
      color: var(--ink);
      box-shadow: var(--shadow);
    }
    .search {
      width: 100%;
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .tag {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid #e1c9ae;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card:hover, .card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 18px 34px rgba(0,0,0,.12);
      border-color: #d6b48d;
      outline: none;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }
    .idx {
      color: var(--muted);
      font-size: .95rem;
      font-weight: 700;
    }
    .word-hidden {
      color: #b8b1a6;
      font-size: 1.4rem;
      letter-spacing: .15em;
    }
    .pinyin {
      font-size: 2rem;
      font-weight: 800;
      margin: 8px 0 10px;
      color: #7a4d23;
      line-height: 1.2;
    }
    .english {
      font-size: 1.35rem;
      line-height: 1.45;
      font-weight: 700;
    }
    .hint {
      margin-top: 18px;
      font-size: 1rem;
      color: var(--muted);
    }
    .empty {
      padding: 30px;
      text-align: center;
      color: var(--muted);
      font-size: 1.2rem;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(33, 24, 15, .48);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }
    .modal.show { display: flex; }
    .panel {
      width: min(1320px, 98vw);
      max-height: 94vh;
      overflow: auto;
      background: var(--panel);
      border-radius: 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,.22);
      border: 1px solid var(--line);
      padding: 28px;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      margin-bottom: 18px;
    }
    .panel-title {
      margin: 0;
      font-size: 3rem;
      line-height: 1.1;
    }
    .panel-sub {
      margin-top: 8px;
      font-size: 1.25rem;
      color: var(--muted);
      font-weight: 700;
    }
    .close-btn {
      border: none;
      background: #efe4d5;
      color: #7a4d23;
      border-radius: 16px;
      width: 64px;
      height: 64px;
      font-size: 1.8rem;
      cursor: pointer;
      font-weight: 800;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 24px;
      align-items: start;
    }
    .section {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 22px;
    }
    .section h3 {
      margin: 0 0 14px;
      font-size: 1.45rem;
    }
    .big-info {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 18px;
    }
    .info-box {
      background: #fcf7f0;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
    }
    .label {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.25;
    }
    .value.small {
      font-size: 1.35rem;
      font-weight: 700;
    }
    .example {
      font-size: 1.4rem;
      line-height: 1.75;
      background: #fffaf3;
      border-left: 6px solid #dfc09b;
      padding: 16px 18px;
      border-radius: 18px;
    }
    .note {
      font-size: 1.25rem;
      line-height: 1.8;
    }
    .stroke-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 8px;
    }
    .char-card {
      background: #fcf8f2;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
    }
    .char-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .char-label {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 700;
    }
    .char-word {
      font-size: 2rem;
      font-weight: 900;
      color: #7a4d23;
    }
    .chars {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .writer-box {
      width: 150px;
      height: 150px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .footer-tip {
      margin-top: 18px;
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
    }
    @media (max-width: 980px) {
      .toolbar { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .panel-title { font-size: 2.2rem; }
      .big-info { grid-template-columns: 1fr; }
      .stroke-wrap { grid-template-columns: 1fr; }
      .writer-box { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>陶瓷主题词汇讲解大屏网站</h1>
      <p>
        先看 <strong>拼音 + 英文</strong>，再点击词卡查看 <strong>简体 / 繁体</strong>、<strong>笔顺动画</strong>、<strong>例句</strong> 和 <strong>使用注意事项</strong>。
        适合教师课堂投屏，也适合学生课后自己复习。
      </p>
    </section>

    <div class="toolbar">
      <input id="search" class="search" type="text" placeholder="搜索拼音、英文、简体、繁体……例如：temperature / 温度 / wēndù" />
      <select id="sortMode" class="select">
        <option value="default">按原顺序</option>
        <option value="pinyin">按拼音排序</option>
      </select>
      <select id="filterMode" class="select">
        <option value="all">全部词汇</option>
        <option value="2">双字词</option>
        <option value="3">三字词</option>
        <option value="4">四字及以上</option>
      </select>
    </div>

    <div class="legend">
      <span class="tag">点击词卡进入讲解模式</span>
      <span class="tag">适合大屏演示</span>
      <span class="tag">支持简繁对照</span>
      <span class="tag">自动播放笔顺动画</span>
    </div>

    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">没有找到匹配的词汇。</div>
  </div>

  <div id="modal" class="modal" aria-hidden="true">
    <div class="panel" role="dialog" aria-modal="true" aria-labelledby="panelTitle">
      <div class="panel-header">
        <div>
          <h2 id="panelTitle" class="panel-title">词汇详情</h2>
          <div id="panelSub" class="panel-sub"></div>
        </div>
        <button id="closeBtn" class="close-btn" aria-label="关闭">×</button>
      </div>

      <div class="detail-grid">
        <div class="section">
          <h3>核心信息</h3>
          <div class="big-info">
            <div class="info-box">
              <div class="label">拼音</div>
              <div id="detailPinyin" class="value"></div>
            </div>
            <div class="info-box">
              <div class="label">英文</div>
              <div id="detailEnglish" class="value small"></div>
            </div>
            <div class="info-box">
              <div class="label">简体</div>
              <div id="detailSimp" class="value"></div>
            </div>
            <div class="info-box">
              <div class="label">繁体</div>
              <div id="detailTrad" class="value"></div>
            </div>
          </div>

          <h3>例句</h3>
          <div id="detailExample" class="example"></div>

          <h3 style="margin-top:18px;">使用提醒</h3>
          <div id="detailNote" class="note"></div>
        </div>

        <div class="section">
          <h3>笔顺动画（简体 / 繁体）</h3>
          <div class="stroke-wrap">
            <div class="char-card">
              <div class="char-head">
                <div class="char-label">简体</div>
                <div id="simpWord" class="char-word"></div>
              </div>
              <div id="simpChars" class="chars"></div>
            </div>
            <div class="char-card">
              <div class="char-head">
                <div class="char-label">繁体</div>
                <div id="tradWord" class="char-word"></div>
              </div>
              <div id="tradChars" class="chars"></div>
            </div>
          </div>
          <div class="footer-tip">
            说明：笔顺动画依赖 HanziWriter 在线脚本。部署到 GitHub Pages / Cloudflare Pages 后可正常显示。
            遇到个别冷门字动画资源缺失时，页面仍会保留该字并显示静态方框位置。
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const VOCAB = [{"trad": "陶瓷", "simp": "陶瓷", "pinyin": "táocí", "english": "pottery and porcelain", "example": "中国的陶瓷很有名，也很有艺术价值。", "note": "名词。常指 pottery 和 porcelain 的总称；说具体“瓷器”时范围更窄。"}, {"trad": "生活", "simp": "生活", "pinyin": "shēnghuó", "english": "life; daily life", "example": "陶瓷在中国人的日常生活中很常见。", "note": "可作名词，也可作动词，如“生活在纽约”。"}, {"trad": "用品", "simp": "用品", "pinyin": "yòngpǐn", "english": "articles for use", "example": "这些都是厨房里常用的生活用品。", "note": "名词，常和“日常、生活、学习”搭配。"}, {"trad": "來歷", "simp": "来历", "pinyin": "láilì", "english": "origin; source", "example": "这件陶器的来历很特别。", "note": "多用于说明东西或人的来源、背景。"}, {"trad": "發明", "simp": "发明", "pinyin": "fāmíng", "english": "to invent; invention", "example": "有人认为火的使用推动了陶器的发明。", "note": "可作动词或名词；“发现”是找到本来就存在的东西。"}, {"trad": "陶器", "simp": "陶器", "pinyin": "táoqì", "english": "pottery; earthenware", "example": "早期人们先做出了简单的陶器。", "note": "和“瓷器”不同，陶器一般较粗、温度较低烧成。"}, {"trad": "鍋", "simp": "锅", "pinyin": "guō", "english": "pot; pan", "example": "这个锅是用泥土做成的。", "note": "量词搭配常见：一口锅。"}, {"trad": "日常", "simp": "日常", "pinyin": "rìcháng", "english": "daily", "example": "这些器物都来自日常生活。", "note": "常作定语，如“日常生活、日常用品”。"}, {"trad": "泥土", "simp": "泥土", "pinyin": "nítǔ", "english": "clay; earth; soil", "example": "人们把泥土做成盆、盘、罐。", "note": "做陶瓷时可理解为 clay；一般也可指 soil。"}, {"trad": "製", "simp": "制", "pinyin": "zhì", "english": "to make; to manufacture", "example": "古人会用泥土制成各种器物。", "note": "常见于书面语和构词，如“制作、制造、制成”。"}, {"trad": "盆", "simp": "盆", "pinyin": "pén", "english": "basin; tub", "example": "这个花盆是陶瓷做的。", "note": "常见词：花盆、脸盆。"}, {"trad": "盤", "simp": "盘", "pinyin": "pán", "english": "plate; dish", "example": "桌上那个盘很漂亮。", "note": "也可作量词或表示盘子、托盘。"}, {"trad": "罐", "simp": "罐", "pinyin": "guàn", "english": "jar; pot", "example": "古代人常用陶罐装水。", "note": "名词，也常作量词，如“一罐茶”。"}, {"trad": "曬乾", "simp": "晒干", "pinyin": "shàigān", "english": "to dry in the sun", "example": "泥做好的器物要先晒干，再拿去烧。", "note": "动作顺序常见：先晒干，再加工。"}, {"trad": "結實", "simp": "结实", "pinyin": "jiēshi", "english": "solid; strong; durable", "example": "这种陶器很结实，不容易坏。", "note": "读 jiēshi 时表示牢固；口语里也可说人“长得很结实”。"}, {"trad": "偶然", "simp": "偶然", "pinyin": "ǒurán", "english": "unexpectedly; accidentally", "example": "人们偶然发现高温会让泥土变硬。", "note": "多表示不是计划中的事。"}, {"trad": "有意識", "simp": "有意识", "pinyin": "yǒuyìshi", "english": "purposely; on purpose", "example": "后来人们开始有意识地改进做陶的方法。", "note": "和“偶然”相对，表示经过思考、故意这样做。"}, {"trad": "笨重", "simp": "笨重", "pinyin": "bènzhòng", "english": "heavy; cumbersome", "example": "早期的器物比较笨重，不方便运输。", "note": "常形容东西又重又不灵活。"}, {"trad": "溫度", "simp": "温度", "pinyin": "wēndù", "english": "temperature", "example": "烧陶的时候，温度非常重要。", "note": "常说“提高温度、控制温度”。"}, {"trad": "美麗", "simp": "美丽", "pinyin": "měilì", "english": "beautiful", "example": "这件瓷器不但实用，而且很美丽。", "note": "多形容外表、景色、事物；书面感比“漂亮”稍强。"}, {"trad": "裝飾品", "simp": "装饰品", "pinyin": "zhuāngshìpǐn", "english": "decoration; ornament", "example": "有些陶瓷后来变成了装饰品。", "note": "强调用来装饰，不一定强调实用功能。"}, {"trad": "實用", "simp": "实用", "pinyin": "shíyòng", "english": "practical; pragmatic", "example": "这个杯子很实用，每天都能用。", "note": "形容东西有实际用途；和“好看”不同。"}, {"trad": "工藝品", "simp": "工艺品", "pinyin": "gōngyìpǐn", "english": "handicraft; article", "example": "很多游客喜欢买中国工艺品。", "note": "多指有艺术性、手工感的物品。"}, {"trad": "捨得", "simp": "舍得", "pinyin": "shěde", "english": "to be willing to part with", "example": "这么贵重的瓷器，我真舍不得用。", "note": "常说“舍得花钱、舍不得扔”。注意常和“不”连用。"}, {"trad": "名聲", "simp": "名声", "pinyin": "míngshēng", "english": "reputation", "example": "中国瓷器在世界上很有名声。", "note": "可好可坏；“名气”更偏中性口语。"}, {"trad": "運", "simp": "运", "pinyin": "yùn", "english": "to transport", "example": "过去把瓷器运到欧洲很不容易。", "note": "常见于“运输、运到、运走”。"}, {"trad": "路途遙遠", "simp": "路途遥远", "pinyin": "lùtú yáoyuǎn", "english": "a long way to go; far away", "example": "因为路途遥远，运输成本很高。", "note": "书面表达，常用来说明距离远、过程长。"}, {"trad": "昂貴", "simp": "昂贵", "pinyin": "ángguì", "english": "expensive; costly", "example": "这些瓷器到了国外以后非常昂贵。", "note": "正式书面语，和“便宜”相对。"}, {"trad": "珍貴", "simp": "珍贵", "pinyin": "zhēnguì", "english": "valuable; precious", "example": "这是很珍贵的历史资料。", "note": "强调价值高、值得珍惜，不一定指价格。"}, {"trad": "驕傲", "simp": "骄傲", "pinyin": "jiāo'ào", "english": "proud", "example": "中国人常为自己的陶瓷文化感到骄傲。", "note": "可褒可贬；“感到骄傲”是正面，“他很骄傲”可能偏负面。"}, {"trad": "貴重", "simp": "贵重", "pinyin": "guìzhòng", "english": "precious; rare; highly treasured", "example": "贵重物品要小心保管。", "note": "多指价格高、价值大的具体物品。"}, {"trad": "政府", "simp": "政府", "pinyin": "zhèngfǔ", "english": "government", "example": "政府曾经重视瓷器贸易。", "note": "公共机构名词。"}, {"trad": "起初", "simp": "起初", "pinyin": "qǐchū", "english": "in the beginning", "example": "起初，陶瓷主要是生活用品。", "note": "常用于叙述发展过程，后面常跟变化。"}, {"trad": "尊貴", "simp": "尊贵", "pinyin": "zūnguì", "english": "honorable; respectable", "example": "在古代，瓷器常被看作尊贵的东西。", "note": "多形容身份、地位或很高级的事物。"}, {"trad": "鄰近", "simp": "邻近", "pinyin": "línjìn", "english": "near; close to; adjacent", "example": "中国的瓷器先传到邻近地区。", "note": "书面语，比“附近”更正式。"}, {"trad": "歐洲", "simp": "欧洲", "pinyin": "Ōuzhōu", "english": "Europe", "example": "很多瓷器后来被运到欧洲。", "note": "专有名词，地名。"}, {"trad": "美洲", "simp": "美洲", "pinyin": "Měizhōu", "english": "America", "example": "后来美洲也很喜欢中国瓷器。", "note": "一般指 North and South America together。"}, {"trad": "遍", "simp": "遍", "pinyin": "biàn", "english": "complete", "example": "老师让我们把课文读一遍。", "note": "量词，表示从头到尾一次。"}, {"trad": "摔", "simp": "摔", "pinyin": "shuāi", "english": "to drop; to smash", "example": "他一不小心把杯子摔了。", "note": "可及物也可不及物；“摔碎”很常见。"}, {"trad": "碎", "simp": "碎", "pinyin": "suì", "english": "broken", "example": "盘子一摔就碎了。", "note": "可作形容词，也可作结果补语，如“打碎”。"}, {"trad": "留", "simp": "留", "pinyin": "liú", "english": "to save; to keep", "example": "请把盒子留着，以后还可以用。", "note": "意思很多，这里重在“保留、留下”。"}, {"trad": "紙", "simp": "纸", "pinyin": "zhǐ", "english": "paper", "example": "人们会用纸把瓷器包起来。", "note": "常见搭配：白纸、纸箱、纸袋。"}, {"trad": "包", "simp": "包", "pinyin": "bāo", "english": "to wrap", "example": "先用纸包好，再放进箱子里。", "note": "动词时表示包裹；也可作名词“bag”。"}, {"trad": "層", "simp": "层", "pinyin": "céng", "english": "layer", "example": "外面要多包几层纸。", "note": "量词，表示层次，如“一层、两层”。"}, {"trad": "種子", "simp": "种子", "pinyin": "zhǒngzi", "english": "seed", "example": "有人把种子放进碎瓷器里做实验。", "note": "本义是 seed，也可比喻“希望的种子”。"}, {"trad": "澆", "simp": "浇", "pinyin": "jiāo", "english": "to pour; to irrigate; to water", "example": "每天给植物浇一点水。", "note": "常见搭配：浇花、浇水。"}, {"trad": "四周", "simp": "四周", "pinyin": "sìzhōu", "english": "all around", "example": "他在花盆四周放了很多小石头。", "note": "表示周围、周边。"}, {"trad": "緊緊", "simp": "紧紧", "pinyin": "jǐnjǐn", "english": "tightly", "example": "箱子要紧紧包好，才不容易碰坏。", "note": "副词，常和动词连用，如“紧紧抓住”。"}, {"trad": "碰", "simp": "碰", "pinyin": "pèng", "english": "to bump against", "example": "搬运的时候不要让箱子互相碰。", "note": "可表示接触、撞到，也可表示“试一试”。"}, {"trad": "大多數", "simp": "大多数", "pinyin": "dàduōshù", "english": "great majority; most", "example": "大多数人都知道中国瓷器很有名。", "note": "后面常接“人、学生、国家、情况”等名词。"}];

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const search = document.getElementById('search');
    const sortMode = document.getElementById('sortMode');
    const filterMode = document.getElementById('filterMode');

    const modal = document.getElementById('modal');
    const closeBtn = document.getElementById('closeBtn');

    const detailPinyin = document.getElementById('detailPinyin');
    const detailEnglish = document.getElementById('detailEnglish');
    const detailSimp = document.getElementById('detailSimp');
    const detailTrad = document.getElementById('detailTrad');
    const detailExample = document.getElementById('detailExample');
    const detailNote = document.getElementById('detailNote');
    const panelTitle = document.getElementById('panelTitle');
    const panelSub = document.getElementById('panelSub');
    const simpWord = document.getElementById('simpWord');
    const tradWord = document.getElementById('tradWord');
    const simpChars = document.getElementById('simpChars');
    const tradChars = document.getElementById('tradChars');

    function normalized(s) {
      return (s || '').toLowerCase().replace(/\s+/g, '');
    }

    function matchesFilter(item) {
      const len = item.simp.length;
      if (filterMode.value === '2') return len === 2;
      if (filterMode.value === '3') return len === 3;
      if (filterMode.value === '4') return len >= 4;
      return true;
    }

    function getShownWord(item) {
      return item.simp === item.trad ? item.simp : `${item.simp} / ${item.trad}`;
    }

    function renderCards() {
      const q = normalized(search.value);
      let list = VOCAB.filter(item => {
        const pool = normalized(item.trad + item.simp + item.pinyin + item.english + item.example + item.note);
        return matchesFilter(item) && (!q || pool.includes(q));
      });

      if (sortMode.value === 'pinyin') {
        list = [...list].sort((a, b) => a.pinyin.localeCompare(b.pinyin));
      }

      grid.innerHTML = '';
      empty.style.display = list.length ? 'none' : 'block';

      list.forEach((item, index) => {
        const card = document.createElement('button');
        card.className = 'card';
        card.type = 'button';
        card.innerHTML = `
          <div>
            <div class="card-top">
              <div class="idx">#${index + 1}</div>
              <div class="word-hidden">${getShownWord(item)}</div>
            </div>
            <div class="pinyin">${item.pinyin}</div>
            <div class="english">${item.english}</div>
          </div>
          <div class="hint">点击查看简繁体、笔顺动画、例句与使用提醒</div>
        `;
        card.addEventListener('click', () => openDetail(item));
        grid.appendChild(card);
      });
    }

    function clearContainer(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function makeWriterBoxes(container, word, prefix) {
      clearContainer(container);
      [...word].forEach((char, i) => {
        const box = document.createElement('div');
        box.className = 'writer-box';
        box.id = `${prefix}-${i}`;
        container.appendChild(box);
        try {
          const writer = HanziWriter.create(box.id, char, {
            width: 140,
            height: 140,
            padding: 10,
            delayBetweenLoops: 1200,
            strokeAnimationSpeed: 1.1,
            delayBetweenStrokes: 180,
            showOutline: true,
            showCharacter: false
          });
          writer.loopCharacterAnimation();
        } catch (e) {
          box.textContent = char;
          box.style.fontSize = '4rem';
          box.style.fontWeight = '800';
          box.style.color = '#7a4d23';
        }
      });
    }

    function openDetail(item) {
      panelTitle.textContent = getShownWord(item);
      panelSub.textContent = `${item.pinyin} · ${item.english}`;
      detailPinyin.textContent = item.pinyin;
      detailEnglish.textContent = item.english;
      detailSimp.textContent = item.simp;
      detailTrad.textContent = item.trad;
      detailExample.textContent = item.example;
      detailNote.textContent = item.note;
      simpWord.textContent = item.simp;
      tradWord.textContent = item.trad;

      makeWriterBoxes(simpChars, item.simp, 'simp');
      makeWriterBoxes(tradChars, item.trad, 'trad');

      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
      clearContainer(simpChars);
      clearContainer(tradChars);
    }

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    search.addEventListener('input', renderCards);
    sortMode.addEventListener('change', renderCards);
    filterMode.addEventListener('change', renderCards);

    renderCards();
  </script>
</body>
</html>
