<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陶瓷詞彙互動練習 / 陶瓷词汇互动练习</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --text: #2c2c2c;
      --muted: #6f6a63;
      --accent: #8c5a3c;
      --accent-soft: #ead9cc;
      --correct: #1e7a46;
      --wrong: #b42318;
      --border: #e4ddd5;
      --shadow: 0 8px 22px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #f8f5f0 0%, #efe7dc 100%);
      color: var(--text);
      line-height: 1.65;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }

    .hero {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      color: var(--accent);
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.98rem;
      cursor: pointer;
      transition: transform 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .scoreboard {
      margin-top: 14px;
      font-size: 0.98rem;
      color: var(--muted);
    }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
      margin-top: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .section h2 {
      margin: 0 0 8px;
      font-size: 1.32rem;
      color: var(--accent);
    }

    .section p.note {
      margin-top: 0;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .question {
      border-top: 1px dashed var(--border);
      padding-top: 16px;
      margin-top: 16px;
    }

    .question:first-child {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
    }

    .q-title {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 1.02rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .chip {
      background: #faf7f3;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s ease;
    }

    .chip:hover {
      background: #f3ebe3;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      background: #faf7f3;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.98rem;
    }

    .option-btn.correct {
      background: #edf8f1;
      border-color: #9bd2af;
      color: var(--correct);
      font-weight: 700;
    }

    .option-btn.wrong {
      background: #fff1f1;
      border-color: #ebb5b5;
      color: var(--wrong);
      font-weight: 700;
    }

    .feedback {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      display: none;
      font-size: 0.96rem;
    }

    .feedback.show { display: block; }
    .feedback.correct { background: #edf8f1; color: var(--correct); }
    .feedback.wrong { background: #fff1f1; color: var(--wrong); }

    .input-row {
      margin-bottom: 18px;
      font-size: 1rem;
      padding: 12px;
      background: #fcfaf7;
      border: 1px solid #eee4d8;
      border-radius: 16px;
    }

    .input-row:last-child {
      margin-bottom: 0;
    }

    .pinyin {
      color: var(--muted);
      font-size: 0.94rem;
      margin-left: 6px;
    }

    .write-area {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
      margin-top: 10px;
      align-items: start;
    }

    .write-col, .pad-col {
      min-width: 0;
    }

    input.answer-input {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 1.12rem;
      width: 100%;
      min-height: 52px;
      outline: none;
      background: #fff;
    }

    .input-tip {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .pad-wrap {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 8px;
    }

    .pad-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .pad-clear {
      background: #f4ece4;
      color: var(--accent);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.88rem;
    }

    canvas.hand-pad {
      width: 100%;
      height: 160px;
      display: block;
      border: 1px dashed #d9cabc;
      border-radius: 12px;
      background:
        linear-gradient(to right, transparent 49.5%, rgba(180,140,110,0.12) 50%, transparent 50.5%),
        linear-gradient(to bottom, transparent 49.5%, rgba(180,140,110,0.12) 50%, transparent 50.5%),
        #fffdfa;
      touch-action: none;
    }

    .small-btn {
      background: var(--accent-soft);
      color: var(--accent);
      margin-top: 12px;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 12px;
      align-items: start;
    }

    #match-left,
    #match-right {
      min-width: 0;
    }

    .match-item {
      background: #faf7f3;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 10px;
      font-size: 0.98rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .match-item:hover {
      background: #f3ebe3;
    }

    .match-item.selected {
      background: var(--accent-soft);
      border-color: #d6b6a0;
      color: var(--accent);
      font-weight: 700;
    }

    .match-item.locked-correct {
      background: #edf8f1;
      border-color: #9bd2af;
      color: var(--correct);
      font-weight: 700;
      cursor: default;
    }

    .match-item.locked-wrong {
      background: #fff1f1;
      border-color: #ebb5b5;
      color: var(--wrong);
      font-weight: 700;
    }

    .teacher-tip {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #fffaf3;
      border: 1px dashed #d7c3af;
      color: #6b5445;
      font-size: 0.95rem;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.42);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: min(620px, 100%);
      background: white;
      border-radius: 22px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 40px rgba(0,0,0,0.16);
      padding: 22px 20px;
      position: relative;
      max-height: 80vh;
      overflow: auto;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: #f4ece4;
      color: var(--accent);
      font-size: 1.1rem;
      border: none;
      cursor: pointer;
    }

    .modal h3 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 1.5rem;
    }

    .modal-line {
      margin: 8px 0;
      font-size: 1rem;
    }

    .modal-label {
      font-weight: 700;
      color: #6a5648;
    }

    .modal-example {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #faf7f3;
      border: 1px solid var(--border);
    }

    .modal-extra {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: #fff7ef;
      border: 1px dashed #d9c2ad;
      font-size: 0.95rem;
    }

    @media (max-width: 760px) {
      h1 { font-size: 1.7rem; }
      .hero, .section { padding: 16px; }

      .write-area {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      input.answer-input {
        width: 100%;
        max-width: 100%;
        min-height: 56px;
        font-size: 1.15rem;
      }

      .match-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .match-item {
        padding: 10px 10px;
        font-size: 0.92rem;
        border-radius: 12px;
      }

      .option-grid {
        grid-template-columns: 1fr;
      }

      canvas.hand-pad {
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1 id="page-title">陶瓷詞彙互動練習</h1>
      <p class="sub" id="hero-sub">學生可以點選、輸入、配對，立刻看到回饋。適合課堂使用，也適合手機查看。</p>
      <div class="toolbar">
        <button class="secondary" id="lang-toggle" onclick="toggleLang()">切換到简体</button>
        <button class="primary" id="hint-btn" onclick="showHints()">顯示提示</button>
        <button class="secondary" id="reset-btn" onclick="resetAll()">重新開始</button>
      </div>
      <div class="scoreboard"><span id="score-label">目前得分：</span><span id="score">0</span> / <span id="total">0</span></div>
    </div>

    <section class="section">
      <h2 id="sec1-title">一、詞彙銀行</h2>
      <p class="note" id="sec1-note">請點選詞語，查看拼音、英文和常見使用場景。電腦和手機都可以直接查看。</p>
      <div id="vocab-bank"></div>
    </section>

    <section class="section">
      <h2 id="sec2-title">二、語境選擇</h2>
      <p class="note" id="sec2-note">請選出最合適的詞語。</p>
      <div id="mcq-container"></div>
    </section>

    <section class="section">
      <h2 id="sec3-title">三、看拼音寫漢字</h2>
      <p class="note" id="sec3-note">請看拼音，在空格中寫出正確的漢字。右邊也可以直接用手指練習書寫。</p>
      <div id="input-container"></div>
      <button class="small-btn" id="check-input-btn" onclick="checkInputs()">檢查答案</button>
      <div id="input-feedback" class="feedback"></div>
    </section>

    <section class="section">
      <h2 id="sec4-title">四、搭配配對</h2>
      <p class="note" id="sec4-note">請點左邊，再點右邊，完成搭配。每配一對會立刻看到對錯。</p>
      <div id="match-status" class="feedback show" style="display:block;"></div>
      <div class="match-grid">
        <div id="match-left"></div>
        <div id="match-right"></div>
      </div>
      <button class="small-btn" id="check-match-btn" onclick="checkMatches()">查看目前結果</button>
      <div class="teacher-tip" id="teacher-tip">小提示：先想一想這個詞最常跟什麼搭配，再點答案。</div>
    </section>
  </div>

  <div class="modal" id="vocab-modal" onclick="closeModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="forceCloseModal()">✕</button>
      <h3 id="modal-word">陶瓷</h3>
      <div class="modal-line"><span class="modal-label" id="modal-pinyin-label">拼音：</span><span id="modal-pinyin"></span></div>
      <div class="modal-line"><span class="modal-label">English:</span> <span id="modal-english"></span></div>
      <div class="modal-line"><span class="modal-label" id="modal-note-label">使用說明：</span><span id="modal-note"></span></div>
      <div class="modal-example" id="modal-example"></div>
      <div class="modal-extra" id="modal-extra" style="display:none;"></div>
    </div>
  </div>

  <script>
    let currentLang = 'trad';
    let score = 0;
    let mcqAnswered = {};
    let inputScored = false;
    let matchScored = false;

    function getText() {
      return i18n[currentLang];
    }

    function totalCount() {
      return getText().mcqs.length + getText().inputItems.length + getText().matchLeft.length;
    }

    function updateScore() {
      document.getElementById('score').textContent = score;
      document.getElementById('total').textContent = totalCount();
    }

    function applyStaticText() {
      const t = getText();
      document.getElementById('page-title').textContent = t.pageTitle;
      document.getElementById('hero-sub').textContent = t.heroSub;
      document.getElementById('lang-toggle').textContent = t.toggle;
      document.getElementById('hint-btn').textContent = t.hintBtn;
      document.getElementById('reset-btn').textContent = t.resetBtn;
      document.getElementById('score-label').textContent = t.scoreLabel;
      document.getElementById('sec1-title').textContent = t.sec1Title;
      document.getElementById('sec1-note').textContent = t.sec1Note;
      document.getElementById('sec2-title').textContent = t.sec2Title;
      document.getElementById('sec2-note').textContent = t.sec2Note;
      document.getElementById('sec3-title').textContent = t.sec3Title;
      document.getElementById('sec3-note').textContent = t.sec3Note;
      document.getElementById('sec4-title').textContent = t.sec4Title;
      document.getElementById('sec4-note').textContent = t.sec4Note;
      document.getElementById('check-input-btn').textContent = t.checkInput;
      document.getElementById('check-match-btn').textContent = t.checkMatch;
      document.getElementById('teacher-tip').textContent = t.teacherTip;
      document.getElementById('match-status').textContent = t.matchPrompt;
      document.getElementById('modal-pinyin-label').textContent = t.pinyinLabel;
      document.getElementById('modal-note-label').textContent = t.noteLabel;
    }

    function renderVocabBank() {
      const t = getText();
      const bank = document.getElementById('vocab-bank');
      bank.innerHTML = '';

      t.vocabGroups.forEach(group => {
        const box = document.createElement('div');
        box.className = 'question';

        const title = document.createElement('div');
        title.className = 'q-title';
        title.textContent = group.title;
        box.appendChild(title);

        const chips = document.createElement('div');
        chips.className = 'chips';

        group.words.forEach(word => {
          const chip = document.createElement('div');
          chip.className = 'chip';
          chip.textContent = word.hanzi;
          chip.onclick = () => openWordModal(word);
          chips.appendChild(chip);
        });

        box.appendChild(chips);
        bank.appendChild(box);
      });
    }

    function openWordModal(word) {
      const t = getText();
      document.getElementById('modal-word').textContent = word.hanzi;
      document.getElementById('modal-pinyin').textContent = word.pinyin;
      document.getElementById('modal-english').textContent = word.english;
      document.getElementById('modal-note').textContent = word.note;
      document.getElementById('modal-example').innerHTML = `<strong>${t.exampleLabel}</strong> ${word.example || ''}`;

      const extra = document.getElementById('modal-extra');
      if (word.extra) {
        extra.style.display = 'block';
        extra.innerHTML = word.extra;
      } else {
        extra.style.display = 'none';
        extra.innerHTML = '';
      }

      document.getElementById('vocab-modal').classList.add('show');
    }

    function closeModal(e) {
      if (e.target.id === 'vocab-modal') {
        document.getElementById('vocab-modal').classList.remove('show');
      }
    }

    function forceCloseModal() {
      document.getElementById('vocab-modal').classList.remove('show');
    }

    function renderMcqs() {
      const t = getText();
      const container = document.getElementById('mcq-container');
      container.innerHTML = '';
      mcqAnswered = {};

      t.mcqs.forEach((item, idx) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.innerHTML = `
          <div class="q-title">${idx + 1}. ${item.q}</div>
          <div class="option-grid" id="options-${idx}"></div>
          <div class="feedback" id="feedback-${idx}"></div>
        `;
        container.appendChild(qDiv);

        const optionsDiv = document.getElementById(`options-${idx}`);
        item.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.textContent = opt;
          btn.onclick = () => handleMcq(idx, opt, btn);
          optionsDiv.appendChild(btn);
        });
      });
    }

    function handleMcq(idx, choice, btn) {
      const t = getText();
      const item = t.mcqs[idx];
      if (mcqAnswered[idx]) return;
      mcqAnswered[idx] = true;

      const options = document.querySelectorAll(`#options-${idx} .option-btn`);
      options.forEach(b => b.disabled = true);

      const feedback = document.getElementById(`feedback-${idx}`);
      if (choice === item.answer) {
        btn.classList.add('correct');
        feedback.className = 'feedback correct show';
        feedback.textContent = `${t.correctMsg}${item.explanation}`;
        score += 1;
      } else {
        btn.classList.add('wrong');
        options.forEach(b => {
          if (b.textContent === item.answer) b.classList.add('correct');
        });
        feedback.className = 'feedback wrong show';
        feedback.textContent = `${t.wrongMsg}${item.answer}。${item.explanation}`;
      }
      updateScore();
    }

    function renderInputs() {
      const t = getText();
      const container = document.getElementById('input-container');
      container.innerHTML = '';
      inputScored = false;
      padInstances = [];

      t.inputItems.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'input-row';
        row.innerHTML = `
          <div>${idx + 1}. ${item.sentence}<span class="pinyin">(${item.pinyin})</span></div>
          <div class="write-area">
            <div class="write-col">
              <input
                class="answer-input"
                id="input-${idx}"
                type="text"
                inputmode="text"
                enterkeyhint="done"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
                lang="${currentLang === 'trad' ? 'zh-Hant' : 'zh-Hans'}"
                placeholder="${t.inputPlaceholder}"
              >
              <div class="input-tip">${t.inputTip}</div>
            </div>
            <div class="pad-col">
              <div class="pad-wrap">
                <div class="pad-header">
                  <span>${t.handwriteLabel}</span>
                  <button type="button" class="pad-clear" onclick="clearPad(${idx})">${t.clearPad}</button>
                </div>
                <canvas class="hand-pad" id="pad-${idx}"></canvas>
              </div>
            </div>
          </div>
        `;
        container.appendChild(row);
      });

      setTimeout(initPads, 0);

      const fb = document.getElementById('input-feedback');
      fb.className = 'feedback';
      fb.textContent = '';
    }

    function initPads() {
      padInstances = [];
      const t = getText();
      t.inputItems.forEach((_, idx) => {
        const canvas = document.getElementById(`pad-${idx}`);
        if (!canvas) return;

        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.floor(rect.width * window.devicePixelRatio);
        canvas.height = Math.floor(rect.height * window.devicePixelRatio);

        const ctx = canvas.getContext('2d');
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#5b4638';

        let drawing = false;

        function getPos(e) {
          const r = canvas.getBoundingClientRect();
          const point = e.touches ? e.touches[0] : e;
          return {
            x: point.clientX - r.left,
            y: point.clientY - r.top
          };
        }

        function start(e) {
          e.preventDefault();
          drawing = true;
          const pos = getPos(e);
          ctx.beginPath();
          ctx.moveTo(pos.x, pos.y);
        }

        function move(e) {
          if (!drawing) return;
          e.preventDefault();
          const pos = getPos(e);
          ctx.lineTo(pos.x, pos.y);
          ctx.stroke();
        }

        function end() {
          drawing = false;
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);

        canvas.addEventListener('touchstart', start, { passive: false });
        canvas.addEventListener('touchmove', move, { passive: false });
        canvas.addEventListener('touchend', end);

        padInstances[idx] = { canvas, ctx };
      });
    }

    function clearPad(idx) {
      const instance = padInstances[idx];
      if (!instance) return;
      const { canvas, ctx } = instance;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      const rect = canvas.getBoundingClientRect();
      ctx.restore();
    }

    function checkInputs() {
      const t = getText();
      let correct = 0;

      t.inputItems.forEach((item, idx) => {
        const input = document.getElementById(`input-${idx}`);
        const value = input.value.trim();

        if (value === item.answer) {
          input.style.borderColor = '#9bd2af';
          input.style.color = 'var(--correct)';
          correct += 1;
        } else {
          input.style.borderColor = '#ebb5b5';
          input.style.color = 'var(--wrong)';
        }
      });

      if (!inputScored) {
        score += correct;
        inputScored = true;
      }

      const fb = document.getElementById('input-feedback');
      fb.className = 'feedback show ' + (correct === t.inputItems.length ? 'correct' : 'wrong');
      fb.textContent = correct === t.inputItems.length
        ? t.inputPerfect
        : `${t.inputPartial} ${correct}/${t.inputItems.length}${t.inputPartial2}`;

      updateScore();
    }

    function renderMatches() {
      const t = getText();
      const leftBox = document.getElementById('match-left');
      const rightBox = document.getElementById('match-right');

      leftBox.innerHTML = '';
      rightBox.innerHTML = '';
      selectedMatchLeft = null;
      matchSelections = {};
      matchedLeftLocked = {};
      matchScored = false;

      document.getElementById('match-status').className = 'feedback show';
      document.getElementById('match-status').textContent = t.matchPrompt;

      t.matchLeft.forEach(left => {
        const div = document.createElement('div');
        div.className = 'match-item';
        div.textContent = left;
        div.dataset.value = left;
        div.onclick = () => {
          if (matchedLeftLocked[left]) return;
          selectedMatchLeft = left;
          document.querySelectorAll('#match-left .match-item').forEach(i => i.classList.remove('selected'));
          div.classList.add('selected');
        };
        leftBox.appendChild(div);
      });

      const shuffledRight = [...t.matchRight].sort(() => Math.random() - 0.5);
      shuffledRight.forEach(right => {
        const div = document.createElement('div');
        div.className = 'match-item';
        div.textContent = right;
        div.dataset.value = right;
        div.onclick = () => handleRightChoice(right, div);
        rightBox.appendChild(div);
      });
    }

    function handleRightChoice(right, rightDiv) {
      const t = getText();
      if (!selectedMatchLeft) return;
      if (matchedLeftLocked[selectedMatchLeft]) return;

      const left = selectedMatchLeft;
      const leftDiv = [...document.querySelectorAll('#match-left .match-item')].find(el => el.dataset.value === left);
      const correctRight = t.matchMap[left];
      const status = document.getElementById('match-status');

      if (right === correctRight) {
        matchedLeftLocked[left] = true;
        matchSelections[left] = right;

        leftDiv.classList.remove('selected');
        leftDiv.classList.add('locked-correct');
        rightDiv.classList.add('locked-correct');

        status.className = 'feedback show correct';
        status.textContent = `${t.matchCorrect} ${left} → ${right}`;
        score += 1;
        updateScore();
      } else {
        leftDiv.classList.remove('selected');
        leftDiv.classList.add('locked-wrong');
        rightDiv.classList.add('locked-wrong');

        status.className = 'feedback show wrong';
        status.textContent = `${t.matchWrong} ${left} → ${correctRight}`;

        setTimeout(() => {
          leftDiv.classList.remove('locked-wrong');
          rightDiv.classList.remove('locked-wrong');
        }, 900);
      }

      selectedMatchLeft = null;
    }

    function checkMatches() {
      const t = getText();
      let correct = 0;
      t.matchLeft.forEach(left => {
        if (matchSelections[left] === t.matchMap[left]) correct += 1;
      });

      const status = document.getElementById('match-status');
      status.className = 'feedback show ' + (correct === t.matchLeft.length ? 'correct' : 'wrong');
      status.textContent = correct === t.matchLeft.length
        ? t.matchPerfect
        : `${t.matchPartial} ${correct}/${t.matchLeft.length}${t.matchPartial2}`;
    }

    function showHints() {
      alert(getText().hintText);
    }

    function resetAll() {
      score = 0;
      mcqAnswered = {};
      inputScored = false;
      matchScored = false;
      selectedMatchLeft = null;
      matchSelections = {};
      matchedLeftLocked = {};
      applyStaticText();
      renderVocabBank();
      renderMcqs();
      renderInputs();
      renderMatches();
      updateScore();
      forceCloseModal();
    }

    function toggleLang() {
      currentLang = currentLang === 'trad' ? 'simp' : 'trad';
      resetAll();
    }

    window.addEventListener('resize', () => {
      if (document.getElementById('input-container').children.length) {
        initPads();
      }
    });

    applyStaticText();
    renderVocabBank();
    renderMcqs();
    renderInputs();
    renderMatches();
    updateScore();
  </script>
</body>
</html>
