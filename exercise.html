<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陶瓷詞彙互動練習 / 陶瓷词汇互动练习</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --text: #2c2c2c;
      --muted: #6f6a63;
      --accent: #8c5a3c;
      --accent-soft: #ead9cc;
      --correct: #1e7a46;
      --wrong: #b42318;
      --border: #e4ddd5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #f8f5f0 0%, #efe7dc 100%);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    .hero {
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      color: var(--accent);
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.98rem;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .scoreboard {
      margin-top: 14px;
      font-size: 0.98rem;
      color: var(--muted);
    }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      margin-top: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .section h2 {
      margin: 0 0 8px;
      font-size: 1.35rem;
      color: var(--accent);
    }

    .section p.note {
      margin-top: 0;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .question {
      border-top: 1px dashed var(--border);
      padding-top: 16px;
      margin-top: 16px;
    }

    .question:first-of-type {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
    }

    .q-title {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 1.02rem;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      background: #faf7f3;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.98rem;
    }

    .option-btn.correct {
      background: #edf8f1;
      border-color: #9bd2af;
      color: var(--correct);
      font-weight: 700;
    }

    .option-btn.wrong {
      background: #fff1f1;
      border-color: #ebb5b5;
      color: var(--wrong);
      font-weight: 700;
    }

    .feedback {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      display: none;
      font-size: 0.96rem;
    }

    .feedback.show { display: block; }
    .feedback.correct { background: #edf8f1; color: var(--correct); }
    .feedback.wrong { background: #fff1f1; color: var(--wrong); }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .chip {
      background: #faf7f3;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s ease;
    }

    .chip.selected {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: #d6b6a0;
      font-weight: 700;
    }

    .word-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0;
    }

    .word {
      background: #faf7f3;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .word.selected {
      background: #ead9cc;
      border-color: #d6b6a0;
      color: var(--accent);
      font-weight: 700;
    }

    .sentence {
      margin-bottom: 14px;
      font-size: 1rem;
    }

    .sentence:last-child { margin-bottom: 0; }

    .small-btn {
      background: var(--accent-soft);
      color: var(--accent);
      margin-top: 12px;
    }

    .teacher-tip {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #fffaf3;
      border: 1px dashed #d7c3af;
      color: #6b5445;
      font-size: 0.95rem;
    }

    .vocab-detail {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #fcfaf7;
      border: 1px solid var(--border);
      color: #5b4b40;
      min-height: 90px;
    }

    .vocab-group-title {
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--accent);
      font-size: 1rem;
    }

    input.answer-input {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 1rem;
      min-width: 140px;
      outline: none;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    @media (max-width: 700px) {
      h1 { font-size: 1.65rem; }
      .container { padding: 16px 12px 40px; }
      .hero, .section { padding: 18px; }
      .match-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1 id="page-title">陶瓷詞彙互動練習</h1>
      <p class="sub" id="hero-sub">學生可直接點選、輸入、配對，立刻看到回饋。適合課堂投影、分組活動與 PPT 改編。</p>
      <div class="toolbar">
        <button class="secondary" id="lang-toggle" onclick="toggleLang()">切換到简体</button>
        <button class="primary" id="hint-btn" onclick="showHints()">顯示提示</button>
        <button class="secondary" id="reset-btn" onclick="resetAll()">重新開始</button>
      </div>
      <div class="scoreboard"><span id="score-label">目前得分：</span><span id="score">0</span> / <span id="total">0</span></div>
    </div>

    <section class="section">
      <h2 id="sec1-title">一、詞彙銀行</h2>
      <p class="note" id="sec1-note">請點選詞彙按鈕，查看拼音、英文與使用說明。這些詞按主題分成 5 組，方便記憶。</p>
      <div id="vocab-bank"></div>
      <div class="vocab-detail" id="vocab-detail">請先點選一個詞。</div>
    </section>

    <section class="section">
      <h2 id="sec2-title">二、語境選擇</h2>
      <p class="note" id="sec2-note">請選出最自然、最合適的詞語。</p>
      <div id="mcq-container"></div>
    </section>

    <section class="section">
      <h2 id="sec3-title">三、手寫輸入填空</h2>
      <p class="note" id="sec3-note">請直接把答案打進空格。可以先想，再輸入。</p>
      <div id="input-container"></div>
      <button class="small-btn" id="check-input-btn" onclick="checkInputs()">檢查答案</button>
      <div id="input-feedback" class="feedback"></div>
    </section>

    <section class="section">
      <h2 id="sec4-title">四、配對連線</h2>
      <p class="note" id="sec4-note">請把左邊的詞和右邊最合適的意思或搭配配對。點左邊，再點右邊。</p>
      <div id="match-status" class="feedback show" style="display:block;"></div>
      <div class="match-grid">
        <div id="match-left"></div>
        <div id="match-right"></div>
      </div>
      <button class="small-btn" id="check-match-btn" onclick="checkMatches()">檢查配對</button>
      <div class="teacher-tip" id="teacher-tip">教師用法建議：可以先讓學生自己找答案，再請他們解釋：你為什麼選這個詞？這個詞最常用在哪裡？</div>
    </section>
  </div>

          '日常用品': '表示每天常常用的东西',

          '摔碎': '表示不小心掉下来而破了',
          '路途遥远': '表示距离很远',
          '紧紧地包': '表示把东西包得很紧'

    };

    function getText() {
      return i18n[currentLang];
    }

    function totalCount() {
      return getText().mcqs.length + getText().inputs.length + 1;
    }

    function updateScore() {
      document.getElementById('score').textContent = score;
      document.getElementById('total').textContent = totalCount();
    }

    function applyStaticText() {
      const t = getText();
      document.getElementById('page-title').textContent = t.pageTitle;
      document.getElementById('hero-sub').textContent = t.heroSub;
      document.getElementById('lang-toggle').textContent = t.toggle;
      document.getElementById('hint-btn').textContent = t.hintBtn;
      document.getElementById('reset-btn').textContent = t.resetBtn;
      document.getElementById('score-label').textContent = t.scoreLabel;
      document.getElementById('sec1-title').textContent = t.sec1Title;
      document.getElementById('sec1-note').textContent = t.sec1Note;
      document.getElementById('sec2-title').textContent = t.sec2Title;
      document.getElementById('sec2-note').textContent = t.sec2Note;
      document.getElementById('sec3-title').textContent = t.sec3Title;
      document.getElementById('sec3-note').textContent = t.sec3Note;
      document.getElementById('sec4-title').textContent = t.sec4Title;
      document.getElementById('sec4-note').textContent = t.sec4Note;
      document.getElementById('check-input-btn').textContent = t.checkInput;
      document.getElementById('check-match-btn').textContent = t.checkMatch;
      document.getElementById('teacher-tip').textContent = t.teacherTip;
    }

    function renderVocabBank() {
      const t = getText();
      const bank = document.getElementById('vocab-bank');
      bank.innerHTML = '';

      t.vocabGroups.forEach((group, groupIndex) => {
        const box = document.createElement('div');
        box.className = 'question';

        const title = document.createElement('div');
        title.className = 'vocab-group-title';
        title.textContent = group.title;
        box.appendChild(title);

        const chips = document.createElement('div');
        chips.className = 'chips';

        group.words.forEach((word, wordIndex) => {
          const chip = document.createElement('div');
          chip.className = 'chip';
          chip.textContent = word.hanzi;
          chip.onclick = () => {
            document.querySelectorAll('#vocab-bank .chip').forEach(c => c.classList.remove('selected'));
            chip.classList.add('selected');
            selectedVocabChip = `${groupIndex}-${wordIndex}`;
            document.getElementById('vocab-detail').innerHTML =
              `<strong>${word.hanzi}</strong><br>${t.pinyinLabel}${word.pinyin}<br>${t.englishLabel}${word.english}<br>${t.noteLabel}${word.note}`;
          };
          chips.appendChild(chip);
        });

        box.appendChild(chips);
        bank.appendChild(box);
      });

      document.getElementById('vocab-detail').textContent = t.vocabPrompt;
    }

    function renderMcqs() {
      const t = getText();
      const container = document.getElementById('mcq-container');
      container.innerHTML = '';
      mcqAnswered = {};

      t.mcqs.forEach((item, idx) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.innerHTML = `
          <div class="q-title">${idx + 1}. ${item.q}</div>
          <div class="options" id="options-${idx}"></div>
          <div class="feedback" id="feedback-${idx}"></div>
        `;
        container.appendChild(qDiv);

        const optionsDiv = qDiv.querySelector(`#options-${idx}`);
        item.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.textContent = opt;
          btn.onclick = () => handleMcq(idx, opt, btn);
          optionsDiv.appendChild(btn);
        });
      });
    }

    function handleMcq(idx, choice, btn) {
      const t = getText();
      const item = t.mcqs[idx];
      const options = document.querySelectorAll(`#options-${idx} .option-btn`);
      if (mcqAnswered[idx]) return;

      mcqAnswered[idx] = true;
      options.forEach(b => b.disabled = true);

      const feedback = document.getElementById(`feedback-${idx}`);
      if (choice === item.answer) {
        btn.classList.add('correct');
        feedback.className = 'feedback correct show';
        feedback.textContent = `${t.correctMsg}${item.explanation}`;
        score += 1;
      } else {
        btn.classList.add('wrong');
        [...options].forEach(b => {
          if (b.textContent === item.answer) b.classList.add('correct');
        });
        feedback.className = 'feedback wrong show';
        feedback.textContent = `${t.wrongMsg}${item.answer}。${item.explanation}`;
      }
      updateScore();
    }

    function renderInputs() {
      const t = getText();
      const container = document.getElementById('input-container');
      container.innerHTML = '';
      inputChecked = false;

      t.inputs.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'sentence';
        row.innerHTML = `
          ${idx + 1}. ${item.text}
          <input class="answer-input" id="input-${idx}" type="text" placeholder="${t.inputPlaceholder}">
          ${item.tail}
        `;
        container.appendChild(row);
      });

      const fb = document.getElementById('input-feedback');
      fb.className = 'feedback';
      fb.textContent = '';
    }

    function checkInputs() {
      const t = getText();
      let correct = 0;

      t.inputs.forEach((item, idx) => {
        const input = document.getElementById(`input-${idx}`);
        const value = input.value.trim();

        if (value === item.answer) {
          input.style.borderColor = '#9bd2af';
          input.style.color = 'var(--correct)';
          correct += 1;
        } else {
          input.style.borderColor = '#ebb5b5';
          input.style.color = 'var(--wrong)';
        }
      });

      if (!inputChecked) {
        score += correct;
        inputChecked = true;
      } else {
        const oldCorrect = Array.from({length: t.inputs.length}).filter((_, idx) => {
          const input = document.getElementById(`input-${idx}`);
          return input.value.trim() === t.inputs[idx].answer;
        }).length;
      }

      const fb = document.getElementById('input-feedback');
      fb.className = 'feedback show ' + (correct === t.inputs.length ? 'correct' : 'wrong');
      fb.textContent = correct === t.inputs.length
        ? t.inputPerfect
        : `${t.inputPartial} ${correct}/${t.inputs.length}${t.inputPartial2}`;

      updateScore();
    }

    function renderMatches() {
      const t = getText();
      selectedMatchLeft = null;
      matchSelections = {};
      matchChecked = false;

      const leftBox = document.getElementById('match-left');
      const rightBox = document.getElementById('match-right');
      const status = document.getElementById('match-status');

      leftBox.innerHTML = '';
      rightBox.innerHTML = '';
      status.className = 'feedback show';
      status.style.display = 'block';
      status.textContent = t.matchPrompt;

      t.matchLeft.forEach(left => {
        const div = document.createElement('div');
        div.className = 'word';
        div.textContent = left;
        div.onclick = () => {
          selectedMatchLeft = left;
          document.querySelectorAll('#match-left .word').forEach(w => w.classList.remove('selected'));
          div.classList.add('selected');
        };
        leftBox.appendChild(div);
      });

      const shuffledRight = [...t.matchRight].sort(() => Math.random() - 0.5);
      shuffledRight.forEach(right => {
        const div = document.createElement('div');
        div.className = 'word';
        div.textContent = right;
        div.onclick = () => {
          if (!selectedMatchLeft) return;
          matchSelections[selectedMatchLeft] = right;
          status.textContent = `${t.matchDone}${selectedMatchLeft} → ${right}`;
          document.querySelectorAll('#match-left .word').forEach(w => w.classList.remove('selected'));
          selectedMatchLeft = null;
        };
        rightBox.appendChild(div);
      });
    }

    function checkMatches() {
      const t = getText();
      let correct = 0;

      t.matchLeft.forEach(left => {
        if (matchSelections[left] === t.matchMap[left]) correct += 1;
      });

      const status = document.getElementById('match-status');
      status.className = 'feedback show ' + (correct === t.matchLeft.length ? 'correct' : 'wrong');
      status.textContent = correct === t.matchLeft.length
        ? t.matchPerfect
        : `${t.matchPartial} ${correct}/${t.matchLeft.length}${t.matchPartial2}`;

      if (!matchChecked && correct === t.matchLeft.length) {
        score += 1;
        matchChecked = true;
      }

      updateScore();
    }

    function showHints() {
      const t = getText();
      document.getElementById('vocab-detail').innerHTML = t.hintText;

      t.mcqs.forEach((item, idx) => {
        const feedback = document.getElementById(`feedback-${idx}`);
        if (feedback && !feedback.classList.contains('show')) {
          feedback.className = 'feedback correct show';
          feedback.textContent = `${t.wrongMsg}${item.answer}。${item.explanation}`;
        }
      });

      t.inputs.forEach((item, idx) => {
        const input = document.getElementById(`input-${idx}`);
        if (input && !input.value.trim()) {
          input.value = item.answer;
        }
      });

      const status = document.getElementById('match-status');
      status.className = 'feedback show correct';
      status.textContent = t.matchLeft
        .map(left => `${left} → ${t.matchMap[left]}`)
        .join('；');
    }

    function resetAll() {
      score = 0;
      selectedVocabChip = null;
      selectedMatchLeft = null;
      matchSelections = {};
      inputChecked = false;
      matchChecked = false;

      applyStaticText();
      renderVocabBank();
      renderMcqs();
      renderInputs();
      renderMatches();
      updateScore();
    }

    function toggleLang() {
      currentLang = currentLang === 'trad' ? 'simp' : 'trad';
      resetAll();
    }

    applyStaticText();
    renderVocabBank();
    renderMcqs();
    renderInputs();
    renderMatches();
    updateScore();
  </script>
</body>
